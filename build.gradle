plugins {
    id 'java-library'
    id 'maven-publish'
    id 'idea'
    id 'net.neoforged.moddev' version '2.0.141'
}

version = mod_version
group = mod_group_id

repositories {
    mavenLocal()
    mavenCentral()
    maven {
        name = "Modrinth"
        url = "https://api.modrinth.com/maven"
        content {
            includeGroup "maven.modrinth"
        }
    }
}

base {
    archivesName = mod_id
}

java.toolchain.languageVersion = JavaLanguageVersion.of(25)

neoForge {
    // Specify the version of NeoForge to use.
    version = project.neo_version

    // This line is optional. Access Transformers are automatically detected
    // accessTransformers.add('src/main/resources/META-INF/accesstransformer.cfg')

    // Default run configurations.
    // These can be tweaked, removed, or duplicated as needed.
    runs {
        client {
            client()

            // Limit GameTest discovery to this mod namespace when running the development client.
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
            // 正式播放默认走自动策略；高级视频参数仅在显式启用诊断开关时生效
            jvmArgument '-Dbili.video.advanced_features=false'
            jvmArgument '-Dbili.video.enable_bench_features=false'
            // 以下参数保留给视频链路诊断使用，默认不会影响正式播放行为
            jvmArgument '-Dbili.video.real_bench=true'
            jvmArgument '-Dbili.video.real_bench.bv=BV1qM4y1w716'
            jvmArgument '-Dbili.video.real_bench.frames=120'
            jvmArgument '-Dbili.video.real_bench.warmup_frames=10'
            jvmArgument '-Dbili.video.real_bench.stop_on_threshold=false'
            jvmArgument '-Dbili.video.real_bench.decode_only=false'
            jvmArgument '-Dbili.video.real_bench.decode_no_output=false'
            jvmArgument '-Dbili.video.real_bench.output_format=rgba'
            jvmArgument '-Dbili.video.real_bench.preview=false'
            jvmArgument '-Dbili.video.real_bench.realtime=false'
            jvmArgument '-Dbili.video.real_bench.max_fps=30'
            jvmArgument '-Dbili.video.real_bench.qualities=16,32,64,80,120,125,126,127'
            jvmArgument '-Dbili.video.native.hwaccel=d3d11va'
            jvmArgument '-Dbili.video.ffmpeg.hwaccel=cuda'
            jvmArgument '-Dbili.video.ffmpeg.decoder=h264_cuvid'
            jvmArgument '-Dbili.video.ffmpeg.verbose=true'
            // 旧版单项解码诊断入口；留空表示不启用
            jvmArgument '-Dbili.video.bench='
            // 动态纹理通道诊断：true=跳过 FFmpeg，直接生成 CPU 彩条验证渲染/上传链路
            jvmArgument '-Dbili.video.cpu_bars=false'
            // 离线渲染/上传诊断：不走网络/FFmpeg，逐档验证 480p→8K 动态纹理上传压力
            jvmArgument '-Dbili.video.render_bench=false'
            jvmArgument '-Dbili.video.render_bench.upload_mode=rgba,yuv420'
        }

        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        // Dedicated GameTest runner for development validation.
        gameTestServer {
            type = "gameTestServer"
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        data {
            clientData()

            // Optional: use a separate working directory when generating data.
            // gameDirectory = project.file('run-data')

            // Generate this mod's resources while reusing existing assets as input.
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }

        // Shared logging setup for local NeoForge run configurations.
        configureEach {
            // Keep registry lifecycle logs visible during local development.
            systemProperty 'forge.logging.markers', 'REGISTRIES'

            // Local run configs stay verbose; release logging is controlled by the packaged runtime.
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        // Bind the main source set to this mod id for NeoForge userdev.
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

// Include resources emitted by the data generator.
sourceSets.main.resources { srcDir 'src/generated/resources' }


dependencies {
    compileOnly "maven.modrinth:net-music:mCrjhdSq"
}

// Expand mod metadata templates from Gradle properties.
var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [minecraft_version      : minecraft_version,
                             minecraft_version_range: minecraft_version_range,
                             neo_version            : neo_version,
                             neo_version_range      : neo_version_range,
                             loader_version_range   : loader_version_range,
                             mod_id                 : mod_id,
                             mod_name               : mod_name,
                             mod_license            : mod_license,
                             mod_version            : mod_version,
                             mod_authors            : mod_authors,
                             mod_description        : mod_description]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}

// Add generated metadata to both Gradle and IDE builds.
sourceSets.main.resources.srcDir generateModMetadata
// Keep IDE metadata fresh on project reload.
neoForge.ideSyncTask generateModMetadata

// Local Maven publication target for development artifacts.
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

// Ensure IDE navigation has dependency sources and Javadocs available.
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
