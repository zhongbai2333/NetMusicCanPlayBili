lightweightSelfTests.each { taskName, config ->
    tasks.register(taskName, JavaExec) {
        group = 'verification'
        description = config[0]
        classpath = sourceSets.main.runtimeClasspath
        mainClass = config[1]
    }
}

tasks.named('check') {
    dependsOn lightweightSelfTests.keySet()
}


tasks.register("runWithRenderDoc", Exec) {
    def javaExecTask = tasks.withType(JavaExec).named("runClient").get()
    def javaHome = javaExecTask.javaLauncher.get().metadata.installationPath.asFile.absolutePath
    def renderDocCmd = providers.gradleProperty('renderDocCmd')
            .orElse('E:\\Program Files\\RenderDoc\\renderdoccmd.exe')
            .get()
    def wrapperJar = layout.projectDirectory.file('gradle/wrapper/gradle-wrapper.jar').asFile
    def workingDirPath = layout.projectDirectory.asFile.absolutePath
    def runClientArgs = ["runClient"]
    def renderDocOffscreenGui = providers.gradleProperty('renderDocOffscreenGui')
    if (renderDocOffscreenGui.isPresent()) {
        runClientArgs.add("-PncpbMp4OffscreenGui=${renderDocOffscreenGui.get()}")
    }
    def renderDocPadVideoDebugLog = providers.gradleProperty('renderDocPadVideoDebugLog')
    if (renderDocPadVideoDebugLog.isPresent()) {
        runClientArgs.add("-PncpbPadVideoDebugLog=${renderDocPadVideoDebugLog.get()}")
    }
    def renderDocPadVideoProbe = providers.gradleProperty('renderDocPadVideoProbe')
    if (renderDocPadVideoProbe.isPresent()) {
        runClientArgs.add("-PncpbPadVideoRenderDocProbe=${renderDocPadVideoProbe.get()}")
    }
    def renderDocPadVideoQuality = providers.gradleProperty('renderDocPadVideoQuality')
    if (renderDocPadVideoQuality.isPresent()) {
        runClientArgs.add("-PncpbPadVideoQuality=${renderDocPadVideoQuality.get()}")
    }
    def renderDocPadVideoNativeHwaccel = providers.gradleProperty('renderDocPadVideoNativeHwaccel')
    if (renderDocPadVideoNativeHwaccel.isPresent()) {
        runClientArgs.add("-PncpbPadVideoNativeHwaccel=${renderDocPadVideoNativeHwaccel.get()}")
    }
    def handheldNativeHwaccel = providers.gradleProperty('ncpbHandheldNativeHwaccel')
    if (handheldNativeHwaccel.isPresent()) {
        runClientArgs.add("-PncpbHandheldNativeHwaccel=${handheldNativeHwaccel.get()}")
    }

    doFirst {
        if (!new File(renderDocCmd).exists()) {
            throw new GradleException("RenderDoc command not found: ${renderDocCmd}. Override with -PrenderDocCmd=...")
        }
        if (!wrapperJar.exists()) {
            throw new GradleException("Gradle wrapper jar not found: ${wrapperJar.absolutePath}")
        }
    }

    commandLine = [
            renderDocCmd,
            "capture",
            "--opt-hook-children",
            "--wait-for-exit",
            "--working-dir",
            workingDirPath,
            "$javaHome/bin/java.exe",
            "-Xmx64m",
            "-Xms64m",
            "-Dorg.gradle.appname=gradlew",
            "-Dorg.gradle.java.home=$javaHome",
            "-classpath",
            wrapperJar.absolutePath,
            "org.gradle.wrapper.GradleWrapperMain"
    ] + runClientArgs
}


dependencies {
    compileOnly "maven.modrinth:net-music:mCrjhdSq"
    compileOnly "maven.modrinth:iris:YEGDGnJM"
}

// 用 Gradle 属性展开模组元数据模板。
var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [minecraft_version      : minecraft_version,
                             minecraft_version_range: minecraft_version_range,
                             neo_version            : neo_version,
                             neo_version_range      : neo_version_range,
                             loader_version_range   : loader_version_range,
                             mod_id                 : mod_id,
                             mod_name               : mod_name,
                             mod_license            : mod_license,
                             mod_version            : mod_version,
                             mod_authors            : mod_authors,
                             mod_description        : mod_description]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}

// Gradle 和 IDE 构建都包含生成的元数据。
sourceSets.main.resources.srcDir generateModMetadata
// IDE 重载时刷新元数据。
neoForge.ideSyncTask generateModMetadata

// 本地 Maven 发布目标，供开发调试使用。
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from(components.java)
        }
    }
    repositories {
        maven {
            url = layout.projectDirectory.dir('repo').asFile.toURI()
        }
    }
}

// 让 IDE 可下载依赖源码和 Javadoc，便于跳转。
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
